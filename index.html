        Object.defineProperty(FormData.prototype, 'keys', {
          value: function* () { },
          writable: true,
          configurable: true
        });
        Object.defineProperty(FormData.prototype, 'values', {
          value: function* () { },
          writable: true,
          configurable: true
        });
        Object.defineProperty(FormData.prototype, 'entries', {
          value: function* () { },
          writable: true,
          configurable: true
        });
        if (typeof Symbol !== 'undefined' && Symbol.iterator) {

            value: function* () { },
            writable: true,
            configurable: true
          });
        }
